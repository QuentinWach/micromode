name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libarpack2-dev liblapacke-dev libopenblas-dev libsuitesparse-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Run Python tests
        run: uv run pytest --cov=micromode --cov-report=xml --cov-report=term-missing

      - name: Run Rust tests
        run: cargo test

      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: uv build

      - name: Smoke-test wheel
        if: matrix.python-version == '3.13'
        run: PYTHON="$(uv python find ${{ matrix.python-version }})" ./scripts/smoke_dist.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
