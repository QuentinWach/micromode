name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust tooling
        run: rustup component add rustfmt clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check Python formatting
        run: uv run ruff format --check .

      - name: Run Python lint
        run: uv run ruff check .

      - name: Run Python type check
        run: uv run pyright

  test-portable:
    name: Portable tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Run Python tests
        run: uv run pytest -m "not slow" --cov=micromode --cov-report=xml --cov-report=term-missing

      - name: Run Rust tests
        run: cargo test --no-default-features

      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: uv build

      - name: Smoke-test wheel
        if: matrix.python-version == '3.13'
        run: uv run python scripts/smoke_dist.py --python "$(uv python find ${{ matrix.python-version }})"

      - name: Upload coverage to Codecov
        id: codecov_upload
        uses: codecov/codecov-action@v4
        continue-on-error: true
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Generate local coverage badge
        if: matrix.python-version == '3.13' && steps.codecov_upload.outcome == 'success'
        run: uv run python scripts/generate_coverage_badge.py coverage.xml docs/assets/coverage.svg

      - name: Upload local coverage badge
        if: matrix.python-version == '3.13' && steps.codecov_upload.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: docs/assets/coverage.svg

  update-coverage-badge:
    name: Update coverage badge
    needs: test-portable
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.test-portable.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download local coverage badge
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-badge
          path: tmp/coverage-badge

      - name: Commit local coverage badge
        if: hashFiles('tmp/coverage-badge/coverage.svg') != ''
        run: |
          cp tmp/coverage-badge/coverage.svg docs/assets/coverage.svg
          if ! git diff --quiet -- docs/assets/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/assets/coverage.svg
            git commit -m "Update coverage badge [skip ci]"
            git push
          fi

  test-full:
    name: Full portable tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Run Python tests
        run: uv run pytest

      - name: Run Rust tests
        run: cargo test --no-default-features

  test-windows:
    name: Windows portable tests
    needs: lint
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Run Python tests
        run: uv run pytest -m "not slow"

      - name: Run Rust tests
        run: cargo test --no-default-features

      - name: Build distributions
        run: uv build

      - name: Smoke-test wheel
        run: uv run python scripts/smoke_dist.py --python "$(uv python find 3.13)"
