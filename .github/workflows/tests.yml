name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-portable:
    name: Portable tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Check release metadata
        run: uv run python scripts/check_release_metadata.py

      - name: Run Python tests
        run: uv run pytest -m "not slow" --cov=micromode --cov-report=xml --cov-report=term-missing

      - name: Run Rust tests
        run: cargo test --no-default-features

      - name: Build distributions
        if: matrix.python-version == '3.13'
        run: uv build

      - name: Smoke-test wheel
        if: matrix.python-version == '3.13'
        run: uv run python scripts/smoke_dist.py --python "$(uv python find ${{ matrix.python-version }})"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-full:
    name: Full portable tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Run Python tests
        run: uv run pytest

      - name: Run Rust tests
        run: cargo test --no-default-features

  test-windows:
    name: Windows portable tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build extension
        run: uv run maturin develop

      - name: Run Python tests
        run: uv run pytest -m "not slow"

      - name: Run Rust tests
        run: cargo test --no-default-features

      - name: Build distributions
        run: uv build

      - name: Smoke-test wheel
        run: uv run python scripts/smoke_dist.py --python "$(uv python find 3.13)"
