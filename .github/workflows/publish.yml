name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish artifacts"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - none

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Build source distribution
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libarpack2-dev liblapacke-dev libopenblas-dev libsuitesparse-dev

      - name: Install macOS system libraries
        if: runner.os == 'macOS'
        run: brew install arpack lapack openblas suite-sparse

      - name: Export macOS native library paths
        if: runner.os == 'macOS'
        run: |
          echo "CPATH=$(brew --prefix lapack)/include:$(brew --prefix openblas)/include:$(brew --prefix suite-sparse)/include" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix gcc)/lib/gcc/current:$(brew --prefix lapack)/lib:$(brew --prefix openblas)/lib:$(brew --prefix arpack)/lib:$(brew --prefix suite-sparse)/lib" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(brew --prefix gcc)/lib/gcc/current:$(brew --prefix lapack)/lib:$(brew --prefix openblas)/lib:$(brew --prefix arpack)/lib:$(brew --prefix suite-sparse)/lib" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix lapack)/lib/pkgconfig:$(brew --prefix openblas)/lib/pkgconfig:$(brew --prefix arpack)/lib/pkgconfig:$(brew --prefix suite-sparse)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          uv tool run --from "maturin>=1.7,<2" maturin build \
            --release \
            --out dist \
            --interpreter "$(uv python find ${{ matrix.python-version }})" \
            --compatibility pypi \
            --auditwheel repair

      - name: Smoke-test wheel
        run: PYTHON="$(uv python find ${{ matrix.python-version }})" ./scripts/smoke_dist.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  inspect:
    name: Inspect distributions
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          ls -lh dist

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python scripts/check_release_metadata.py
          python scripts/check_dist_artifacts.py dist \
            --require-cpython 3.10 3.11 3.12 3.13 \
            --require-platform macosx manylinux
          twine check dist/*

      - name: Upload checked distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: inspect
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/micromode/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: inspect
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/micromode/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
