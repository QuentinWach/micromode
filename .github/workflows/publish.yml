name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish artifacts"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - none

permissions:
  contents: read

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Build source distribution
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Build wheel
        shell: bash
        run: |
          extra_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            extra_args+=(--auditwheel repair)
          fi

          uv tool run --from "maturin>=1.7,<2" maturin build \
            --release \
            --out dist \
            --interpreter "$(uv python find ${{ matrix.python-version }})" \
            --compatibility pypi \
            "${extra_args[@]}"

      - name: Smoke-test wheel
        shell: bash
        run: |
          python_bin="$(uv python find ${{ matrix.python-version }})"
          "$python_bin" scripts/smoke_dist.py --python "$python_bin"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  inspect:
    name: Inspect distributions
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          ls -lh dist

      - name: Check metadata
        run: |
          python -m pip install --upgrade "packaging>=24.2" "pkginfo>=1.12.1.2" "twine>=6.2,<7"
          python - <<'PY'
          import importlib.metadata as md
          for package in ("packaging", "pkginfo", "twine"):
              print(f"{package} {md.version(package)}")
          PY
          python scripts/check_release_metadata.py
          python scripts/check_dist_artifacts.py dist \
            --require-cpython 3.10 3.11 3.12 3.13 \
            --require-platform macosx manylinux win
          twine check dist/*

      - name: Upload checked distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: inspect
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/micromode/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: inspect
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/micromode/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
